---
# Канонический состав FSM-стадий = модули threlium/states/*.py.
# Источник истины — docs/FSM.md §2.1; зеркало для Ansible-loop'ов.
threlium_fsm_mailbox_stages:
  - { id: ingress }
  - { id: enrich }
  - { id: reasoning }
  - { id: reflect }
  - { id: thread_memory }
  - { id: global_memory }
  - { id: subagent_intent }
  - { id: subagent_end }
  - { id: cli_intent }
  - { id: cli_hitl_out }
  - { id: cli_resume }
  - { id: cli_exec }
  - { id: response_append }
  - { id: response_edit }
  - { id: response_observe }
  - { id: tasks_upsert }
  - { id: enrich_fast }
  - { id: response_finalize }
  - { id: egress_router }
  - { id: egress_email }
  - { id: egress_telegram }
  - { id: egress_matrix }
  - { id: formal_reason }
  - { id: memory_query }
  - { id: summarize_context }
  - { id: summarize_memory }
  - { id: archive }

threlium_fsm_stage_ids: "{{ threlium_fsm_mailbox_stages | map(attribute='id') | list }}"

# Стадия archive — обычный stages/archive/Maildir (см. threlium_fsm_mailbox_stages), не legacy archive/Maildir вне stages/.
# Для bootstrap Maildir (site.yml) и acceptance — durable Maildir'ы по threlium_maildir_rel_paths.
threlium_maildir_rel_paths: "{{ threlium_fsm_mailbox_stages | map(attribute='id') | map('regex_replace', '^(.*)$', 'stages/\\1/Maildir') | list }}"

# Base values for combine() merge in site.yml: user overrides threlium_* partially.
_threlium_litellm_base:
  max_retries: 3
  length_recovery_max_attempts: 2
  llm_endpoints:
    - score: 0.0
      enabled: true
      model: "gpt-4o-mini"
      api_base: ""
      api_key: null
      timeout: 120
  embedding_endpoints:
    - embedding_score: 0.0
      enabled: true
      model: "text-embedding-3-small"
      api_base: ""
      api_key: null
      timeout: 120
  targets:
    cli_hitl_resume:
      target_score: 0.0
    reasoning:
      target_score: 0.0
    enrich_plan:
      target_score: 0.0
    enrich_task_hypotheses:
      target_score: 1.0
    lightrag_llm:
      target_score: 0.0
    lightrag_embedding:
      target_embedding_score: 0.0
    lightrag_rerank:
      target_rerank_score: 0.0
    summarize_context:
      target_score: 0.0
    ingress_distill:
      target_score: 1.0

_threlium_lightrag_base:
  language: "Russian"
  entity_types: "person,organization,location,concept,event,technology,document"
  chunk_body_tokens: 1200
  chunk_body_overlap_pct: 10
  insert_batch: 8
  max_parallel_insert: 2
  llm_model_max_async: 4
  embedding_func_max_async: 4
  prompts_overlay: true
  tiktoken_model_name: "gpt-4o-mini"
  aquery_hints: ""
  query_api: "aquery_llm"
  query_mode: "hybrid"
  query_top_k: 20
  query_chunk_top_k: 10
  query_max_total_tokens: 15000
  query_max_entity_tokens: 4000
  query_max_relation_tokens: 5000
  query_response_type: "Concise Bullet Points"
  enable_rerank: true
  rag_loop_shutdown_timeout_sec: 30
  bootstrap_timeout_sec: 1800

_threlium_knowledge_base:
  formal_report_max_chars: 4000
  formal_derived_max_chars: 6000
  formal_query_max_chars: 4000
  observation_max_chars: 180000

# bridges — base для combine(); host_vars задают только переопределяемые поля (IMAP creds и т.д.).
_threlium_bridges_base:
  email:
    imap_host: ""
    imap_user: ""
    imap_pass: ""
    imap_port: 0
    imap_use_ssl: true
    imap_ssl_verify: true
    imap_idle_max_sec: 1740
    imap_processed_folder: "Threlium/Processed"
    imap_ensure_processed_folder: false
  matrix:
    homeserver: ""
    user: ""
    token: ""
  telegram:
    bot_token: ""
    bot_api_base: ""

_threlium_enrich_base:
  context_thread_n: 200
  context_thread_memory_n: 100
  context_global_n: 100
  context_max_chars: 180000
  model_context_tokens: 262144
  context_safety_margin_tokens: 2000
  lightrag_query_overhead_tokens: 2000
  enrich_task_hypotheses_overhead_tokens: 2000
  reasoning_overhead_tokens: 4000
  summarize_overhead_tokens: 2000
  tier1_full: 5
  tier2_summary: 15
  tier_preview_chars: 200
  priority_user: 10.0
  priority_graph: 6.0
  priority_unified: 8.0
  priority_thread_mem: 4.0
  priority_global_mem: 3.0
  priority_extra: 5.0
  tier1_medium_ratio: 2
  summarize_enabled: true

# Эффективная конфигурация = base ⊕ пользовательские overrides (host_vars / group_vars / -e).
# Отдельные имена (*_effective) принципиальны: при запуске `ansible-playbook … -e @host_vars/<host>.yml`
# переменные threlium_litellm / threlium_lightrag / threlium_enrich / threlium_knowledge приходят как
# extra-vars (высший приоритет) — set_fact их НЕ перекрывает, поэтому merge нельзя писать обратно в то же
# имя (ключи из *_base, отсутствующие в host_vars, терялись → в threlium.yaml попадал «сырой» host_vars).
# Role-vars вычисляются лениво на момент использования в шаблоне: combine видит и base, и overrides.
threlium_bridges_effective: "{{ _threlium_bridges_base | combine(threlium_bridges, recursive=True, list_merge='replace') }}"
threlium_litellm_effective: "{{ _threlium_litellm_base | combine(threlium_litellm, recursive=True, list_merge='replace') }}"
threlium_lightrag_effective: "{{ _threlium_lightrag_base | combine(threlium_lightrag, recursive=True, list_merge='replace') }}"
threlium_enrich_effective: "{{ _threlium_enrich_base | combine(threlium_enrich, recursive=True, list_merge='replace') }}"
threlium_knowledge_effective: "{{ _threlium_knowledge_base | combine(threlium_knowledge, recursive=True, list_merge='replace') }}"

