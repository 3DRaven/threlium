# Дефолт для прод: без skip_tags. Harness в site.yml — только задачи с never+refresh (не входят в обычный прогон).
# Для docker-SUT и pytest задайте ANSIBLE_CONFIG=ansible-e2e.cfg (см. ansible/README.md).
[defaults]
inventory = inventory/hosts.yml
roles_path = roles
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections
host_key_checking = True
retry_files_enabled = False
stdout_callback = default
callback_result_format = yaml
interpreter_python = auto_silent

# SSH: меньше round-trip на модуль (pipelining) и переиспользование сессии (ControlMaster).
# Для ansible_connection=docker (e2e) эффект даёт в основном pipelining там, где применимо; SSH — прод/SSH-инвентарь.
# ControlPath НЕ задаём здесь намеренно: ssh для повторяющейся опции берёт ПЕРВОЕ значение, а ssh_args идёт
# перед per-host ansible_ssh_common_args. Глобальный ControlPath тут перетёр бы per-host holder-сокет.
# Поэтому ControlPath/мультиплекс задаётся per-host в inventory того хоста, которому нужен заранее поднятый master.
[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[inventory]
enable_plugins = ini, yaml
